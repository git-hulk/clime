version: 2

builds:
  - id: clime
    binary: clime
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.ver={{.Version}}
      - -X main.gitCommit={{.FullCommit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: clime
    name_template: "clime_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

release:
  github:
    owner: git-hulk
    name: clime
